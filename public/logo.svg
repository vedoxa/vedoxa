<?xml version="1.0" encoding="utf-8"?>
<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="gradYellowRed" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffc107" />
            <stop offset="50%" stop-color="#ff9800" />
            <stop offset="100%" stop-color="#ff5500" />
        </linearGradient>

        <linearGradient id="gradRedYellow" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#ff5500" />
            <stop offset="50%" stop-color="#ff9800" />
            <stop offset="100%" stop-color="#ffc107" />
        </linearGradient>

        <filter id="softGlow">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <g transform="rotate(180 150 150)">
        <path d="M 150 30 L 70 200 Q 60 220 75 225 Q 85 228 95 210 L 150 100 Z"
              fill="url(#gradYellowRed)"
              stroke="rgba(255, 255, 255, 0.3)"
              stroke-width="2"
              stroke-linejoin="round"
              filter="url(#softGlow)" />

        <path d="M 150 30 L 230 200 Q 240 220 225 225 Q 215 228 205 210 L 150 100 Z"
              fill="url(#gradRedYellow)"
              stroke="rgba(255, 255, 255, 0.3)"
              stroke-width="2"
              stroke-linejoin="round"
              filter="url(#softGlow)" />

        <ellipse cx="150" cy="90" rx="15" ry="40" fill="rgba(255, 255, 255, 0.15)" filter="url(#softGlow)" />
    </g>
</svg>
